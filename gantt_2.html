<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt 2</title>
    <link rel="stylesheet" href="gantt_2.css">
    <script src="load_sw.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
</head>

<body>
    <div class="actions-container">
        <button id="add-row">Agregar fila</button>
        <!-- Botón opcional por si quieres limpieza manual -->
        <button id="clear-storage" style="background-color: #ff4d4d; color: white;">Borrar datos</button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <td>Nombre</td>
                    <td>Inicio</td>
                    <td>Duración</td>
                    <td>Fin</td>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="gantt_2.js"></script>
</body>

</html>
