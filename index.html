<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        /* Control de visualización mediante CSS */
        td input {
            display: none;
            width: 100%;
            box-sizing: border-box;
            padding: 4px;
        }

        td span {
            display: inline-block;
            width: 100%;
            min-height: 1.2em;
        }

        /* Cuando tbody tiene la clase editable, muestra inputs y oculta spans */
        tbody.editable td input {
            display: block;
        }

        tbody.editable td span {
            display: none;
        }
    </style>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="gantt-container">
        <!-- Columna estática para los nombres de las tareas (Izquierda) -->
        <div class="gantt-tasks" id="ganttTasks">
            <div class="gantt-tasks-header">Tarea</div>
        </div>

        <!-- Área con scroll para la línea de tiempo gráfica (Derecha) -->
        <div class="gantt-timeline" id="ganttTimeline">
            <div class="gantt-timeline-header" id="timelineHeader"></div>
            <div class="gantt-timeline-body" id="timelineBody"></div>
        </div>
    </div>
    <header>
        <button onclick="toggleEdit()">Editar</button>
        <button onclick="copyToClipboard()">Copiar</button>
    </header>
    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Topic</th>
                <th>Start date</th>
                <th>Duration (days)</th>
                <th>End date</th>
                <th>Starts after (Predecessor Id)</th>
            </tr>
            <tr>
                <th></th>
                <th><input name="filter" type="search" oninput="onFilterChange(event)"></th>
                <th colspan="4"></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        var localData = localStorage.getItem("gantt_data");

        var data = localData ? JSON.parse(localData) : [
            { id: "1", title: "Buscar tags en Adobe", start_date: "2026-07-15", duration: "2" },
            { id: "2", title: "Buscar tags en GTM", predecessor: "1", duration: "3" },
        ];

        var tbody = document.querySelector("tbody");
        var currentFilter = "";

        function saveToLocalStorage() {
            localStorage.setItem("gantt_data", JSON.stringify(data));
        }

    </script>

    <script>
        function toggleEdit() {
            tbody.classList.toggle("editable");
            // Agrega fila vacía si se pasa a modo edición y no hay una fila borrador
            if (isEditable()) {
                ensureRowPlaceholder();
            }
            renderTable();
        }
        function isEditable() {
            return tbody.classList.contains("editable");
        }
    </script>

    <script>
        function copyToClipboard() {
            var headers = Array.from(document.querySelectorAll("thead tr:first-child th"))
                .map(th => th.innerText.trim());

            var rows = [headers.join("\t")];

            data.forEach(task => {
                if (!task.id && !task.title) return;

                var rowCells = [
                    task.id || "",
                    task.title || "",
                    task.start_date || "",
                    task.duration || "1",
                    task.end_date || "",
                    task.predecessor || ""
                ];

                rows.push(rowCells.join("\t"));
            });

            var clipboardText = rows.join("\n");

            navigator.clipboard.writeText(clipboardText)
                .then(() => alert("Datos copiados"))
                .catch(err => console.error("Error al copiar al portapapeles: ", err));
        }
    </script>

    <script>
        function formatDate(date) {
            if (!date || isNaN(date.getTime())) return "";
            return date.toISOString().split('T')[0];
        }

        // --- NUEVA FUNCIÓN: Suma solo días hábiles ---
        function addBusinessDays(dateStr, days) {
            if (!dateStr) return "";
            // Forzamos la hora para evitar problemas de zona horaria
            var date = new Date(dateStr + "T00:00:00");
            var remainingDays = parseInt(days || 0, 10);

            // Mientras queden días por sumar...
            while (remainingDays > 0) {
                // Avanzamos un día natural
                date.setDate(date.getDate() + 1);
                
                var dayOfWeek = date.getDay();
                
                // 0 = Domingo, 6 = Sábado.
                // Si NO es fin de semana, descontamos 1 de la duración pendiente.
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                    remainingDays--;
                }
            }
            return formatDate(date);
        }

        function generateId() {
            return Math.floor(Math.random() * 10000).toString();
        }

        function calculateTaskDates(task) {
            task.start_date = getStartDate(task);
            task.end_date = getEndDate(task);
        }

        function getStartDate(task) {
            if (task.predecessor) {
                var pred = data.find(t => t.id === task.predecessor);
                if (pred) {
                    return getEndDate(pred);
                }
            }
            return task.start_date || formatDate(new Date());
        }

        function getEndDate(task) {
            // LÓGICA ACTUALIZADA
            var start = task.start_date || getStartDate(task);
            var duration = parseInt(task.duration, 10);
            
            if (isNaN(duration) || duration < 1) duration = 1;
            
            // Usamos la nueva función en lugar de addDays
            return addBusinessDays(start, duration); 
        }

        function updateSuccessorTasks(parentTask) {
            data.forEach(task => {
                if (task.predecessor === parentTask.id) {
                    calculateTaskDates(task);
                    updateSuccessorTasks(task);
                }
            });
        }
        function ensureRowPlaceholder() {
            var lastTask = data[data.length - 1];
            if (!lastTask || lastTask.title !== "") {
                data.push({ id: generateId(), title: "", duration: "1" });
            }
        }

        function onFilterChange(e) {
            currentFilter = e.target.value.toLowerCase();
            renderTable();
        }

        function onInputBlur(e, index, field) {
            var value = e.target.value;
            var task = data[index];

            if (!task) return;

            if (task[field] === value) return;

            task[field] = value;

            if (field === "predecessor" || field === "start_date" || field === "duration") {
                calculateTaskDates(task);
                updateSuccessorTasks(task);
            }

            if (index === data.length - 1 && task.title !== "") {
                ensureRowPlaceholder();
            }

            saveToLocalStorage();
            renderTable();
        }

        function renderTable() {
            if (!tbody) return;
            tbody.innerHTML = "";

            data.forEach(task => calculateTaskDates(task));

            data.forEach((rowContent, index) => {
                if (currentFilter && !rowContent.title.toLowerCase().includes(currentFilter)) {
                    if (index !== data.length - 1 || rowContent.title !== "") return;
                }

                var row = document.createElement("tr");
                row.innerHTML = `
                <td>
                    <span>${rowContent.id || ''}</span>
                    <input type="text" value="${rowContent.id || ''}" onblur="onInputBlur(event, ${index}, 'id')">
                </td>
                <td>
                    <span>${rowContent.title || ''}</span>
                    <input type="text" value="${rowContent.title || ''}" onblur="onInputBlur(event, ${index}, 'title')">
                </td>
                <td>
                    <span>${rowContent.start_date || ''}</span>
                    <input type="date" value="${rowContent.start_date || ''}" onblur="onInputBlur(event, ${index}, 'start_date')" ${rowContent.predecessor ? 'disabled' : ''}>
                </td>
                <td>
                    <span>${rowContent.duration || '1'}</span>
                    <input type="number" min="1" value="${rowContent.duration || '1'}" onblur="onInputBlur(event, ${index}, 'duration')">
                </td>
                <td>
                    <span>${rowContent.end_date || ''}</span>
                    <input type="date" value="${rowContent.end_date || ''}" disabled>
                </td>
                <td>
                    <span>${rowContent.predecessor || ''}</span>
                    <input type="text" value="${rowContent.predecessor || ''}" onblur="onInputBlur(event, ${index}, 'predecessor')">
                </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Renderizado inicial
        renderTable();
    </script>

    <script>
        // Tus datos de origen (Filtrado preventivo del id 32 que venía vacío)
const rawData = data;

const tasks = rawData.filter(t => t.title.trim() !== "");

// Ancho asignado en píxeles para representar un solo día
const DAY_WIDTH = 25; 

// Evita errores de zona horaria local al parsear cadenas de texto 'YYYY-MM-DD'
function parseDate(dateStr) {
    const [year, month, day] = dateStr.split('-');
    return new Date(year, month - 1, day);
}

// 1. Identificar las fechas límite inicial y final del proyecto completo
let minDate = parseDate(tasks[0].start_date);
let maxDate = parseDate(tasks[0].end_date);

tasks.forEach(task => {
    const start = parseDate(task.start_date);
    const end = parseDate(task.end_date);
    if (start < minDate) minDate = start;
    if (end > maxDate) maxDate = end;
});

// Otorgar un colchón visual de 2 días a los extremos
minDate.setDate(minDate.getDate() - 2);
maxDate.setDate(maxDate.getDate() + 2);

// Calcular la cantidad total de días del espectro del calendario
const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));

// 2. Renderizar el área de fechas superior y las líneas verticales punteadas
const timelineHeader = document.getElementById('timelineHeader');
const timelineBody = document.getElementById('timelineBody');
timelineHeader.style.width = `${totalDays * DAY_WIDTH}px`;

for (let i = 0; i < totalDays; i++) {
    const currentDate = new Date(minDate);
    currentDate.setDate(minDate.getDate() + i);
    
    // Crear líneas guía verticales
    const gridLine = document.createElement('div');
    gridLine.className = 'grid-line';
    gridLine.style.left = `${i * DAY_WIDTH}px`;
    timelineBody.appendChild(gridLine);

    // Escribir texto de las fechas cada 3 días para evitar que se amontonen
    if (i % 3 === 0) {
        const dateCell = document.createElement('div');
        dateCell.className = 'date-cell';
        dateCell.style.left = `${i * DAY_WIDTH}px`;
        dateCell.innerText = currentDate.toLocaleDateString('es-ES', { month: 'short', day: 'numeric' });
        timelineHeader.appendChild(dateCell);
    }
}

// 3. Renderizar las descripciones de tareas y el bloque de barras correspondiente
const ganttTasksContainer = document.getElementById('ganttTasks');

tasks.forEach((task) => {
    // Generar fila informativa en la columna izquierda
    const taskRow = document.createElement('div');
    taskRow.className = 'task-row';
    taskRow.innerText = `${task.id}. ${task.title}`;
    ganttTasksContainer.appendChild(taskRow);

    // Crear la fila paralela en el cuerpo gráfico derecho
    const timelineRow = document.createElement('div');
    timelineRow.className = 'timeline-row';
    timelineBody.appendChild(timelineRow);

    // Calcular las distancias y dimensiones basadas en píxeles
    const taskStart = parseDate(task.start_date);
    const taskEnd = parseDate(task.end_date);
    
    const daysFromStart = Math.ceil((taskStart - minDate) / (1000 * 60 * 60 * 24));
    const taskDaysDuration = Math.ceil((taskEnd - taskStart) / (1000 * 60 * 60 * 24));

    const leftPos = daysFromStart * DAY_WIDTH;
    const widthPos = taskDaysDuration * DAY_WIDTH;

    // Clasificación semántica de colores según palabras clave
    let colorClass = 'bar-default';
    const lowerTitle = task.title.toLowerCase();
    if (lowerTitle.includes('buscar')) colorClass = 'bar-buscar';
    else if (lowerTitle.includes('migrar')) colorClass = 'bar-migrar';
    else if (lowerTitle.includes('qa')) colorClass = 'bar-qa';
    else if (lowerTitle.includes('validación') || lowerTitle.includes('verificar')) colorClass = 'bar-validacion';

    // Construcción de la barra de la Carta Gantt
    const bar = document.createElement('div');
    bar.className = `gantt-bar ${colorClass}`;
    bar.style.left = `${leftPos}px`;
    bar.style.width = `${widthPos}px`;
    
    // Inyección de atributos informativos para los CSS Tooltips
    const tooltipInfo = `${task.title} | ${task.start_date} al ${task.end_date} (${task.duration} d)`;
    bar.setAttribute('data-tooltip', tooltipInfo);

    // Texto de días embebido en la barra
    const barText = document.createElement('span');
    barText.className = 'gantt-bar-text';
    barText.innerText = `${task.duration}d`;
    
    bar.appendChild(barText);
    timelineRow.appendChild(bar);
});

    </script>
</body>

</html>
